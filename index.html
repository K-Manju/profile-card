<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <img src="image/profile.jpg" alt="girl image" class="profile">
        <p class="title">Manju</p>
        <p class="work">Front-end Developer</p>
        <div class="logo">
            <a href="facebook.com"><img src="icons/facebook.png" alt="facebook logo"></a>
            <a href="x.com"><img src="icons/twitter.png" alt="x logo"></a>
            <a href="instagram.com"><img src="icons/instagram.png" alt="instagram logo"></a>
            <a href="youtube.com"><img src="icons/youtube.png" alt="youtube logo"></a>
        </div>
        <div class="btn">
            <button>Subscribe</button>
            <button>Message</button>
        </div>
        <div class="stats">
  <span><img src="icons/heart.png" width="15"> 60k</span>
  <span class="pipe">|</span>

  <span><img src="icons/chat.png" width="15"> 1k</span>
  <span class="pipe">|</span>

  <span><img src="icons/share.png" width="15"> 500</span>
</div>
    </div>
</body>
</html>
