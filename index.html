<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <img src="image/profile.jpg" alt="girl image" class="profile">
        <h4>CodingLab</h4>
        <p>YouTuber & Blogger</p>
        <div class="logo">
            <a href="facebook.com"><img src="icons/facebook.png" alt="facebook logo"></a>
            <a href="x.com"><img src="icons/twitter.png" alt="x logo"></a>
            <a href="instagram.com"><img src="icons/instagram.png" alt="instagram logo"></a>
            <a href="youtube.com"><img src="icons/youtube.png" alt="youtube logo"></a>
        </div>
        <button>Subscribe</button>
        <button>Message</button>
        <p></p>
    </div>
</body>
</html>
